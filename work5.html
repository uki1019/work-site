<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>work5 - PORTFOLIO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .work-detail-page {
            min-height: 100vh;
            padding: 120px 5% 80px;
            background-color: #FFFFFF;
        }
        
        .work-detail-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dark);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: var(--transition);
        }
        
        .back-button:hover {
            color: var(--primary-color);
            transform: translateX(-5px);
        }
        
        .work-detail-header {
            margin-bottom: 3rem;
        }
        
        .work-detail-title {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }
        
        .work-detail-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            color: var(--text-light);
            font-size: 0.95rem;
        }
        
        .work-detail-images {
            margin-bottom: 4rem;
        }
        
        .work-hero-image {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 2.5rem auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            background: #fafafa;
            min-height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-size: 0.9rem;
            letter-spacing: 0.12em;
        }
        
        .sub-image-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .sub-image-item {
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #fafafa;
        }
        
        .sub-image-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .sub-image-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
        }
        
        .sub-image-caption {
            padding: 0.75rem 1rem 1rem;
            font-size: 0.9rem;
            color: var(--text-dark);
        }
        
        .work-detail-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 4rem;
            margin-top: 4rem;
        }
        
        .work-detail-description p {
            line-height: 2;
            color: var(--text-light);
        }
        
        .work-detail-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .work-info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .work-info-label {
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--primary-color);
        }
        
        .work-info-value {
            font-size: 0.95rem;
            color: var(--text-dark);
        }
        
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            overflow: auto;
            padding: 2rem;
        }
        
        .lightbox.active {
            display: block;
        }
        
        .lightbox-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90vh;
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            padding: 16px;
            user-select: none;
        }
        
        .lightbox-prev {
            left: 20px;
        }
        
        .lightbox-next {
            right: 20px;
        }
        
        .lightbox-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }
        
        @media (max-width: 900px) {
            .work-detail-content {
                grid-template-columns: 1fr;
                gap: 2.5rem;
            }
            
            .sub-image-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- ナビゲーション -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">PORTFOLIO<span class="nav-logo-name">トウ ウキ</span></a>
        <ul class="nav-menu">
            <li><a href="index.html#home" class="nav-link">HOME</a></li>
            <li><a href="index.html#works" class="nav-link">WORKS</a></li>
            <li><a href="index.html#contact" class="nav-link">CONTACT</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="work-detail-page">
        <div class="work-detail-container">
            <a href="index.html" class="back-button">
                ← 作品一覧に戻る
            </a>
            
            <div class="work-detail-header">
                <h1 class="work-detail-title">work5</h1>
                <div class="work-detail-meta">
                    <span>UIUXデザイン</span>
                    <span>|</span>
                    <span>グループ制作</span>
                    <span>|</span>
                    <span>2025</span>
                </div>
            </div>
            
            <div class="work-detail-images">
                <!-- メインビジュアル -->
                <div class="work-hero-image">
                    <img src="image/work5-1.jpg" alt="work5 メインビジュアル">
                </div>
                
                <!-- サブページ一覧 -->
                <h2 style="font-size: 1.5rem; margin-bottom: 2rem; margin-top: 3rem; color: var(--primary-color);">ビジュアル一覧</h2>
                <div class="sub-image-list">
                    <div class="sub-image-item" onclick="openLightbox(0)">
                        <img src="image/work5-1.jpg" alt="work5-1" />
                        <p class="sub-image-caption">01. ビジュアル 1</p>
                    </div>
                    <div class="sub-image-item" onclick="openLightbox(1)">
                        <img src="image/work5-2.jpg" alt="work5-2" />
                        <p class="sub-image-caption">02. ビジュアル 2</p>
                    </div>
                    <div class="sub-image-item" onclick="openLightbox(2)">
                        <img src="image/work5-3.jpg" alt="work5-3" />
                        <p class="sub-image-caption">03. ビジュアル 3</p>
                    </div>
                    <div class="sub-image-item" onclick="openLightbox(3)">
                        <img src="image/work5-4.jpg" alt="work5-4" />
                        <p class="sub-image-caption">04. ビジュアル 4</p>
                    </div>
                </div>
            </div>
            
            <!-- 灯箱弹窗 -->
            <div id="lightbox" class="lightbox">
                <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
                <span class="lightbox-nav lightbox-prev" onclick="changeImage(-1)">‹</span>
                <span class="lightbox-nav lightbox-next" onclick="changeImage(1)">›</span>
                <img class="lightbox-content" id="lightbox-img">
                <div class="lightbox-counter" id="lightbox-counter"></div>
            </div>
            
            <div class="work-detail-content">
                <div class="work-detail-description">
                    <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary-color);">プロジェクト概要</h2>
                    <p>
                        世界がますます暑くなり、終末の危機が迫る中、かき氷を愛するおじさんが“食べること”で自らを救おうとする物語です。
                    </p>
                </div>
                
                <div class="work-detail-info">
                    <div class="work-info-item">
                        <div class="work-info-label">使用ツール</div>
                        <div class="work-info-value">Figma / Photoshop</div>
                    </div>
                    
                    <div class="work-info-item">
                        <div class="work-info-label">制作期間</div>
                        <div class="work-info-value">1ヶ月</div>
                    </div>
                    
                    <div class="work-info-item">    
                        <div class="work-info-label">担当範囲</div>
                        <div class="work-info-value">キャラクターデザイン / キービジュアル制作</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const images = [
            'image/work5-1.jpg',
            'image/work5-2.jpg',
            'image/work5-3.jpg',
            'image/work5-4.jpg'
        ];
        
        let currentIndex = 0;
        
        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const counter = document.getElementById('lightbox-counter');
            
            lightbox.classList.add('active');
            img.src = images[currentIndex];
            counter.textContent = `${currentIndex + 1} / ${images.length}`;
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function changeImage(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = images.length - 1;
            if (currentIndex >= images.length) currentIndex = 0;
            
            const img = document.getElementById('lightbox-img');
            const counter = document.getElementById('lightbox-counter');
            img.src = images[currentIndex];
            counter.textContent = `${currentIndex + 1} / ${images.length}`;
        }
        
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (lightbox.classList.contains('active')) {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'ArrowRight') changeImage(1);
            }
        });
        
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
